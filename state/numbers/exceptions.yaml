{
  "exceptions": [
    {
      "pattern": "2027",
      "match_scope": "literal",
      "reason": "venue year metadata"
    },
    {
      "id": "EXC-LATEX-LAYOUT-DIMENSIONS",
      "pattern": "^0\\.48$",
      "reason": "LaTeX subfigure width in paper/sections/exp.tex, not a reported scientific number."
    },
    {
      "id": "EXC-FOUNDATION-MODEL-VERSIONS",
      "pattern": "^(?:3\\.5|3\\.7|4\\.1|2024|2025|20241022)$",
      "reason": "Model-version and date metadata literals from the migrated arXiv source, not result quantities. Kept literal-anchored because context-wide exceptions can mask reported result numbers on the same line."
    },
    {
      "id": "EXC-SWEBENCH-TASK-IDS",
      "pattern": "^(?:[7-9]\\d{3}|1[0-6]\\d{3})$",
      "reason": "Raw SWE-bench task-id lists included in supplementary TeX; current exception schema cannot scope by file path."
    },
    {
      "id": "EXC-GIT-DIFF-MODES-HASHES",
      "pattern": "^(?:100644|0000000)$",
      "reason": "Git diff file modes and zero hashes embedded in supplementary patch listings."
    },
    {
      "id": "EXC-GIT-DIFF-HUNK-RANGES",
      "pattern": "^\\+\\d{1,3},\\d{3}$",
      "reason": "Git diff hunk ranges embedded in supplementary patch listings."
    },
    {
      "id": "EXC-SUPPLEMENTARY-CODE-THRESHOLDS",
      "pattern": "^(?:0\\.3|0\\.7)$",
      "reason": "Numeric constants inside supplementary code-diff listings, not paper result claims."
    },
    {
      "id": "EXC-REGISTERED-NONMACRO-NUMBERS",
      "pattern": "^(?:32\\.0\\\\%|33\\.3\\\\%|35\\.6\\\\%|36\\.8\\\\%|39\\.7\\\\%|30\\.0\\\\%|38\\.0\\\\%|23\\.0\\\\%|14\\.0\\\\%|39\\.0\\\\%|28\\.0\\\\%|51\\.3\\\\%|32\\.5\\\\%|40\\.7\\\\%|2\\.3\\\\%|0\\.5|1\\.0|10,000|53\\.0\\\\%|51\\.0\\\\%|33,000|23\\.3\\\\%|40\\.5\\\\%|1\\.67|2\\.0|40\\\\%|33\\.0\\\\%|19\\.0\\\\%|59\\.5\\\\%|28\\.9\\\\%|24\\.5\\\\%)$",
      "reason": "These literals are registered in state/numbers/groups/appendix.yaml, but the hardened checker only treats macro-backed verified numbers as literal matches."
    }
  ]
}
